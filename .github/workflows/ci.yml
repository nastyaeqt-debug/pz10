name: Analytics Service CI

on: [push, pull_request]

jobs:
  automation-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ШАГ 0: Клонирование репозитория
      - name: 0. Checkout code
        uses: actions/checkout@v3

      # ШАГ 1: Установка Python
      - name: 1. Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ШАГ 2: Установка зависимостей
      - name: 2. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi pytest pytest-cov httpx flake8

      # ШАГ 3: Запуск линтеров
      - name: 3. Run Linters (Style Check)
        run: |
          # flake8 проверит код на ошибки и соответствие PEP8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # ШАГ 4: Запуск тестов и проверка порога (80%)
      - name: 4. Run E2E Tests & Check Coverage Threshold
        run: |
          # Если покрытие < 80%, этот шаг вернет ошибку и пайплайн упадет
          pytest --cov=. --cov-report=xml --cov-report=term --cov-fail-under=80

      # ШАГ 5: Загрузка артефакта (отчета о покрытии)
      - name: 5. Upload Coverage Artifact
        if: always() # Выполнять даже если тесты упали, чтобы увидеть, почему
        uses: actions/upload-artifact@v3
        with:
          name: monthly-sales-coverage-report
          path: coverage.xml